name: Cyph3rChat CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_TOOL_OPTIONS: -Xmx4g
  GRADLE_OPTS: -Dorg.gradle.parallel=true

jobs:
  # ── Android Build ──
  android:
    name: Android Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build debug APK
        run: |
          ./gradlew app:assembleDebug --no-daemon --stacktrace
          mkdir -p build-artifacts
          find app/build/outputs/apk/debug -name "*.apk" -exec cp {} build-artifacts/cypherchat.apk \; -quit

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypherchat-android-apk
          path: build-artifacts/cypherchat.apk
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypherchat-test-results
          path: '**/build/test-results/test/'
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypherchat-lint-report
          path: '**/build/reports/lint-results-debug.html'
          retention-days: 14

  # ── Create GitHub Release ──
  release:
    name: Create Release
    needs: [android]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: cypherchat-android-apk
          path: artifacts

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('Build {0}', github.run_number) }}
          files: artifacts/**/*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') || github.event_name == 'workflow_dispatch' }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
