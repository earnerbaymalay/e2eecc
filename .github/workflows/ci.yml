name: Cyph3rChat CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  JAVA_TOOL_OPTIONS: -Xmx4g
  GRADLE_OPTS: -Dorg.gradle.parallel=true

jobs:
  android:
    name: Android Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew
        continue-on-error: false

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug
        continue-on-error: false

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: cyph3rchat-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypherchat-test-results
          path: '**/build/test-results/test/'
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypherchat-lint-report
          path: '**/build/reports/lint-results-debug.html'
          retention-days: 14

  release:
    name: Create Release
    needs: [android]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: cyph3rchat-debug-${{ github.sha }}
          path: artifacts

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.run_number) }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || format('Build {0}', github.run_number) }}
          files: artifacts/**/*.apk
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') && github.event_name != 'workflow_dispatch' }}
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
