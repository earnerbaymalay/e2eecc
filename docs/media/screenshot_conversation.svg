  </g>
  <!-- Input Bar -->
  <rect y="560" width="360" height="80" fill="#161B22"/>
  <rect x="12" y="572" width="280" height="48" rx="24" stroke="#2A3145" fill="#1E2535"/>
  <text x="28" y="602" font-family="sans-serif" font-size="14" fill="#4A5268">Message</text>
  <circle cx="324" cy="596" r="24" fill="#00D4FF"/>
  <path d="M316,588l16,8-16,8v-16z" fill="#0D1117"/>
