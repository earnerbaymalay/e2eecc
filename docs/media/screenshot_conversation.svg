<svg width="360" height="640" xmlns="http://www.w3.org/2000/svg">
  <rect width="360" height="640" fill="#0D1117"/>
  <!-- Top Bar -->
  <rect width="360" height="56" fill="#0D1117"/>
  <text x="56" y="38" font-family="sans-serif" font-size="20" fill="#C9D1D9" font-weight="bold">Alex K</text>
  <path d="M20,38l-8-8,8-8" stroke="#8B93A8" stroke-width="2" fill="none"/>
  <!-- E2EE Badge -->
  <g transform="translate(280, 20)">
    <path d="M10,2c-2.2,0-4,1.8-4,4v2h-1c-0.5,0-1,0.5-1,1v8c0,0.5,0.5,1,1,1h10c0.5,0,1-0.5,1-1v-8c0-0.5-0.5-1-1-1h-1v-2C14,3.8,12.2,2,10,2z" fill="#3FB950" transform="scale(0.8)"/>
