<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420">
  <style>
    .bg { fill: #0d1117; }
    .phone { fill: #161b22; stroke: #30363d; stroke-width: 1; }
    .screen { fill: #0D1117; }
    .teal { fill: #00D4FF; }
    .teal-text { fill: #00D4FF; font-family: sans-serif; font-weight: 600; }
    .white { fill: #e6edf3; font-family: sans-serif; }
    .dim { fill: #8b949e; font-family: sans-serif; font-size: 11px; }
    .navy { fill: #0D1117; }
    .card { fill: #161b22; rx: 8; }
    .border { stroke: #2A3145; stroke-width: 0.5; }
    .lock { fill: #00D4FF; }
    .title { fill: #e6edf3; font-family: sans-serif; font-size: 16px; font-weight: 600; }
    .subtitle { fill: #8b949e; font-family: sans-serif; font-size: 11px; }
    .msg-out { fill: #003D2E; rx: 12; }
    .msg-in { fill: #1E2535; rx: 12; }
    .msg-text { fill: #e6edf3; font-family: sans-serif; font-size: 11px; }
    .bubble-text { fill: #e6edf3; font-family: sans-serif; font-size: 10px; }
  </style>

  <!-- Background -->
  <rect width="720" height="420" class="bg" rx="16"/>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" fill="#00D4FF" font-family="monospace" font-size="13" font-weight="600">🔐 Cyph3rChat — App Screenshots</text>
  <text x="360" y="48" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="11">End-to-end encrypted messaging · Double Ratchet · No accounts · No servers</text>

  <!-- Phone 1: Chat List Screen -->
  <g transform="translate(40, 70)">
    <!-- Phone frame -->
    <rect x="0" y="0" width="200" height="330" rx="20" class="phone"/>
    <rect x="6" y="6" width="188" height="318" rx="16" class="screen"/>

    <!-- Status bar -->
    <text x="100" y="24" text-anchor="middle" fill="#e6edf3" font-family="sans-serif" font-size="10" font-weight="600">9:41</text>

    <!-- Top bar -->
    <rect x="6" y="30" width="188" height="36" class="navy"/>
    <text x="30" y="53" fill="#00D4FF" font-family="sans-serif" font-size="12" font-weight="600">🔒 Cyph3rChat</text>

    <!-- FAB -->
    <circle cx="170" cy="305" r="18" class="teal"/>
    <text x="170" y="310" text-anchor="middle" fill="#0D1117" font-size="18" font-weight="bold">+</text>

    <!-- Chat List -->
    <!-- Contact 1 -->
    <circle cx="28" cy="88" r="16" fill="#161b22"/>
    <text x="28" y="93" text-anchor="middle" fill="#00D4FF" font-size="12" font-weight="600">A</text>
    <text x="52" y="85" fill="#e6edf3" font-family="sans-serif" font-size="12">Alex K</text>
    <text x="52" y="100" fill="#8b949e" font-family="sans-serif" font-size="10">✓ Sounds good — I'll send...</text>
    <circle cx="175" cy="82" r="8" class="teal"/>
    <text x="175" y="85" text-anchor="middle" fill="#0D1117" font-size="8" font-weight="bold">2</text>

    <!-- Divider -->
    <line x1="24" y1="112" x2="180" y2="112" stroke="#2A3145" stroke-width="0.5"/>

    <!-- Contact 2 -->
    <circle cx="28" cy="132" r="16" fill="#161b22"/>
    <text x="28" y="137" text-anchor="middle" fill="#00D4FF" font-size="12" font-weight="600">B</text>
    <text x="52" y="129" fill="#e6edf3" font-family="sans-serif" font-size="12">Bob</text>
    <text x="52" y="144" fill="#8b949e" font-family="sans-serif" font-size="10">Start a conversation</text>

    <!-- Divider -->
    <line x1="24" y1="156" x2="180" y2="156" stroke="#2A3145" stroke-width="0.5"/>

    <!-- Label -->
    <text x="100" y="325" text-anchor="middle" fill="#00D4FF" font-family="monospace" font-size="10">Chat List</text>
  </g>

  <!-- Phone 2: Conversation Screen -->
  <g transform="translate(260, 70)">
    <rect x="0" y="0" width="200" height="330" rx="20" class="phone"/>
    <rect x="6" y="6" width="188" height="318" rx="16" class="screen"/>

    <!-- Status bar -->
    <text x="100" y="24" text-anchor="middle" fill="#e6edf3" font-family="sans-serif" font-size="10" font-weight="600">9:41</text>

    <!-- Top bar -->
    <rect x="6" y="30" width="188" height="36" class="navy"/>
    <text x="30" y="53" fill="#e6edf3" font-family="sans-serif" font-size="12">Alex K</text>
    <text x="150" y="53" fill="#3FB950" font-family="sans-serif" font-size="8" font-weight="600">🔒 E2EE</text>

    <!-- Encryption banner -->
    <rect x="12" y="72" width="176" height="20" rx="6" fill="#00D4FF15"/>
    <text x="100" y="86" text-anchor="middle" fill="#00D4FF" font-family="sans-serif" font-size="7">🔒 Messages are end-to-end encrypted</text>

    <!-- Messages -->
    <!-- Incoming -->
    <rect x="12" y="100" width="130" height="28" class="msg-in"/>
    <text x="20" y="118" class="bubble-text">Hey! I got the invitation link.</text>

    <!-- Outgoing -->
    <rect x="58" y="140" width="130" height="28" class="msg-out"/>
    <text x="66" y="158" class="bubble-text">Sure! Let me pull it up.</text>

    <!-- Input bar -->
    <rect x="12" y="268" width="148" height="28" rx="14" fill="#161b22" stroke="#2A3145" stroke-width="0.5"/>
    <text x="24" y="286" fill="#8b949e" font-family="sans-serif" font-size="10">Message</text>
    <circle cx="172" cy="282" r="14" class="teal"/>
    <text x="172" y="286" text-anchor="middle" fill="#0D1117" font-size="12">↑</text>

    <!-- Label -->
    <text x="100" y="325" text-anchor="middle" fill="#00D4FF" font-family="monospace" font-size="10">Conversation</text>
  </g>

  <!-- Phone 3: Verification Screen -->
  <g transform="translate(480, 70)">
    <rect x="0" y="0" width="200" height="330" rx="20" class="phone"/>
    <rect x="6" y="6" width="188" height="318" rx="16" class="screen"/>

    <!-- Status bar -->
    <text x="100" y="24" text-anchor="middle" fill="#e6edf3" font-family="sans-serif" font-size="10" font-weight="600">9:41</text>

    <!-- Top bar -->
    <rect x="6" y="30" width="188" height="36" class="navy"/>
    <text x="24" y="53" fill="#e6edf3" font-family="sans-serif" font-size="12">← Alex K</text>
    <text x="170" y="53" text-anchor="end" fill="#8b949e" font-size="12">🔑</text>

    <!-- Fingerprint banner -->
    <rect x="12" y="80" width="176" height="80" rx="8" fill="#161b22" stroke="#00D4FF" stroke-width="1"/>
    <text x="100" y="100" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="10">Security code</text>
    <text x="100" y="120" text-anchor="middle" fill="#00D4FF" font-family="monospace" font-size="11">A3F7 2C91 8B4D E5F6</text>
    <text x="100" y="136" text-anchor="middle" fill="#00D4FF" font-family="monospace" font-size="11">7D3C 9A1E F042 6B85</text>

    <!-- Verification info -->
    <text x="100" y="180" text-anchor="middle" fill="#3FB950" font-family="sans-serif" font-size="10" font-weight="600">✅ Verified</text>
    <text x="100" y="194" text-anchor="middle" fill="#8b949e" font-family="sans-serif" font-size="8">This conversation is secure</text>

    <!-- Label -->
    <text x="100" y="325" text-anchor="middle" fill="#00D4FF" font-family="monospace" font-size="10">Verification</text>
  </g>
</svg>
